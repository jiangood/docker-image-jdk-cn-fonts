name: Publish Docker image to GHCR

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: write

jobs:
  push_to_registry:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: jdk-17
        uses: docker/build-push-action@v6
        with:
          file: ./17/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jdk-cn-fonts:17

      - name: jdk-21
        uses: docker/build-push-action@v6
        with:
          file: ./21/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jdk-cn-fonts:21
            ghcr.io/${{ github.repository_owner }}/jdk-cn-fonts:latest
